<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Algoritmo de Bresenham - Mafer Saavedra</title>
    <style>
    body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f0f2f5; padding: 20px; }
    .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 95%; max-width: 1100px; }
    .main-layout { display: flex; justify-content: center; gap: 20px; margin-top: 20px; align-items: flex-start; }
    canvas { border: 2px solid #333; background-color: white; flex-shrink: 0; }
    .table-container { flex-grow: 1; max-height: 500px; overflow-y: auto; border: 1px solid #ddd; }
    table { border-collapse: collapse; width: 100%; font-size: 11px; }
    th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
    th { background-color: #007bff; color: white; position: sticky; top: 0; }
    .inputs { margin-bottom: 15px; }
    input { width: 60px; padding: 5px; margin-right: 10px; }
    button { padding: 8px 15px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>
    <div class="container">
        <h2>Bresenham: Visualización de Píxeles</h2>
        <div class="inputs">
            <input type="number" id="x0" value="5" placeholder="X0">
            <input type="number" id="y0" value="5" placeholder="Y0">
            <input type="number" id="x1" value="45" placeholder="X1">
            <input type="number" id="y1" value="25" placeholder="Y1">
            <button id="btnDibujar">Dibujar Línea</button>
        </div>
        <div class="main-layout">
            <canvas id="miCanvas" width="500" height="500"></canvas>
            <div class="table-container">
                <table id="tablaPasos">
                    <thead><tr><th>Paso</th><th>X</th><th>Y</th><th>Error</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
